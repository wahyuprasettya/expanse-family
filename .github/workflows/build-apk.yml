name: Build APK Fast

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 3. Install dependencies (lebih cepat)
      - name: Install dependencies
        run: npm ci

      # 4. Cache Gradle (biar gak lama)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      # 5. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7. Generate android folder (AMAN untuk Expo & RN)
      - name: Prepare Android project
        run: |
          if [ ! -d "android" ]; then
            echo "Expo project detected, running prebuild..."
            npx expo prebuild --platform android
          else
            echo "React Native project detected"
          fi

      # 8. Grant permission
      - name: Grant execute permission
        run: chmod +x android/gradlew

      # 9. Build APK (DEBUG = lebih cepat & minim error)
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --parallel

      # 10. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk